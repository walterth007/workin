<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Vagas - WorkIN</title>

  <!-- FAVICON -->
  <link
    rel="icon"
    type="image/png"
    href="assets/img/Logo-WorkIN-Aba-Final.svg"
  >

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/vagas.css"
  >

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

  <!-- FONTES -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <div class="logo">

      <a href="index.html">

        <img
          src="assets/img/Logo-WorkIN-Aba-Final.svg"
          alt="WorkIN"
        >

      </a>

    </div>

    <div class="search-box">

      <input
        type="text"
        id="pesquisa"
        placeholder="Pesquisar vagas..."
        onkeyup="pesquisarVagas()"
      >

      <button class="lupa-pesquisa">

        <i class="fa-solid fa-magnifying-glass"></i>

      </button>

    </div>

    <div
      class="menu-area"
      onclick="abrirMenu()"
    >

      <span class="menu-texto">
        Menu
      </span>

      <i class="fa-solid fa-bars"></i>

    </div>

  </nav>

  <!-- MENU -->
  <div class="menu-lateral hidden">

    <div class="menu-topo">

      <h2>Menu</h2>

      <button
        class="fechar-menu"
        onclick="fecharMenu()"
      >

        ✕

      </button>

    </div>

    <ul>

      <li onclick="window.location.href='index.html'">
        🏠 Início
      </li>

      <li onclick="window.location.href='vagas.html'">
        💼 Vagas
      </li>

      <li onclick="window.location.href='sobre.html'">
        📘 Sobre
      </li>

      <li onclick="window.location.href='login.html'">
        👤 Perfil
      </li>

    </ul>

  </div>

  <!-- HERO -->
  <section class="hero-vagas">

    <div class="hero-texto">

      <h1>

        Encontre sua próxima oportunidade

      </h1>

      <p>

        Empresas reais com vagas abertas em diversas áreas.

      </p>

    </div>

  </section>

  <!-- VAGAS -->
  <section class="vagas-section">

    <div
      class="vagas-container"
      id="vagasContainer"
    >

    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="footer-copy">

      © 2026 WorkIN • Todos os direitos reservados

    </div>

  </footer>

  <script src="assets/js/vagas.js"></script>

</body>
</html>
