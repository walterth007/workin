<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login - WorkIN</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/login.css">

  <!-- FONT -->
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" 
    rel="stylesheet"
  >

</head>

<body>

<!-- ======================================================
     NAVBAR
======================================================= -->
<nav class="navbar">

  <!-- LOGO -->
  <div class="logo">

    <a href="index.html">

      <img 
        src="assets/img/Logo-WorkIN-Aba-Final.svg"
        alt="WorkIN"
      >

    </a>

  </div>

  <!-- MENU HAMBÚRGUER -->
  <div class="menu-icon">

    <img 
      src="assets/icons/menu-ham.svg" 
      alt="Menu"
    >

  </div>

</nav>

<!-- ======================================================
     MENU LATERAL
======================================================= -->
<div class="menu-lateral hidden">

  <!-- TOPO -->
  <div class="menu-topo">

    <h2>Menu</h2>

    <button 
      class="fechar-menu"
      onclick="fecharMenu()"
    >

      ✕

    </button>

  </div>

  <!-- LINKS -->
  <ul>

    <li onclick="window.location.href='index.html'">

      🏠 Início

    </li>

    <li onclick="window.location.href='sobre.html'">

      📘 Sobre

    </li>

    <li onclick="window.location.href='login.html'">

      👤 Perfil

    </li>

  </ul>

</div>
  <!-- ======================================================
       MAIN
  ======================================================= -->
  <main>

    <!-- LOGIN CONTAINER -->
    <div class="login-container">

      <!-- LOGO -->
      <img 
        src="assets/img/Logo-WorkIN-Aba-Final.svg"
        alt="WorkIN"
        class="logo-login"
      >

      <!-- TABS -->
      <div class="tabs">

        <button 
          class="tab-btn ativo"
          onclick="mostrarLogin()"
          id="btnLogin"
        >

          Login

        </button>

        <button 
          class="tab-btn"
          onclick="mostrarCadastro()"
          id="btnCadastro"
        >

          Cadastro

        </button>

      </div>

      <!-- LOGIN -->
      <div class="form-box" id="loginBox">

        <input 
          type="email"
          id="email"
          placeholder="Digite seu email"
        >

        <input 
          type="password"
          id="senha"
          placeholder="Digite sua senha"
        >

        <button onclick="login()">

          Entrar

        </button>

      </div>

      <!-- CADASTRO -->
      <div class="form-box hidden" id="cadastroBox">

        <input 
          type="text"
          id="nomeCadastro"
          placeholder="Seu nome"
        >

        <input 
          type="email"
          id="emailCadastro"
          placeholder="Seu email"
        >

        <input 
          type="password"
          id="senhaCadastro"
          placeholder="Sua senha"
        >

        <button onclick="cadastrar()">

          Criar Conta

        </button>

      </div>

    </div>

  </main>

  <!-- ======================================================
       FOOTER
  ======================================================= -->
  <footer>

    <h1>

      Work<span>IN</span>

    </h1>

    <p>

      © 2026 WorkIN - Todos os direitos reservados.

    </p>

  </footer>

  <!-- JS -->
  <script src="assets/js/login.js"></script>

</body>
</html>
