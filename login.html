<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login - WorkIN</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/login.css">

  <!-- FONT -->
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" 
    rel="stylesheet"
  >

</head>

<body>

  <!-- ======================================================
       CONTAINER LOGIN
  ======================================================= -->
  <div class="login-container">

    <!-- LOGO -->
    <img 
      src="assets/img/Logo-WorkIN-Aba-Final.svg" 
      alt="WorkIN"
      class="logo"
    >

    <!-- TÍTULO -->
    <h1>Entrar</h1>

    <!-- FORM -->
    <div class="form-box">

      <!-- EMAIL -->
      <input 
        type="email"
        id="email"
        placeholder="Digite seu email"
      >

      <!-- SENHA -->
      <input 
        type="password"
        id="senha"
        placeholder="Digite sua senha"
      >

      <!-- BOTÃO LOGIN -->
      <button onclick="login()">

        Entrar

      </button>

      <!-- CADASTRO -->
      <p>

        Não possui conta?

        <span onclick="mostrarCadastro()">

          Criar Conta

        </span>

      </p>

    </div>

    <!-- ======================================================
         CADASTRO
    ======================================================= -->
    <div 
      class="form-box hidden"
      id="cadastroBox"
    >

      <h2>Criar Conta</h2>

      <!-- NOME -->
      <input 
        type="text"
        id="nomeCadastro"
        placeholder="Seu nome"
      >

      <!-- EMAIL -->
      <input 
        type="email"
        id="emailCadastro"
        placeholder="Seu email"
      >

      <!-- SENHA -->
      <input 
        type="password"
        id="senhaCadastro"
        placeholder="Sua senha"
      >

      <!-- BOTÃO -->
      <button onclick="cadastrar()">

        Cadastrar

      </button>

    </div>

  </div>

  <footer>

    <h1>

      Work<span>IN</span>

    </h1>

    <p>

      © 2026 WorkIN - Todos os direitos reservados.

    </p>

  </footer>

  <!-- JS -->
  <script src="assets/js/login.js"></script>

</body>
</html>
